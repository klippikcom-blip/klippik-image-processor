name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller klippik_processor.spec

      - name: Verify build
        run: |
          dir dist
          if (!(Test-Path "dist\KlippiK_Image_Processor.exe")) {
            Write-Error "EXE not found"
            exit 1
          }
          $size = (Get-Item "dist\KlippiK_Image_Processor.exe").length / 1MB
          Write-Host "EXE size: $([math]::Round($size, 1)) MB"

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: KlippiK_Image_Processor_Windows
          path: dist/KlippiK_Image_Processor.exe
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.0.${{ github.run_number }}"
          name: "KlippiK Image Processor v1.0.${{ github.run_number }}"
          body: |
            ## KlippiK Image Processor — Windows EXE

            **How to use:**
            1. Download `KlippiK_Image_Processor.exe` below
            2. Double-click — browser opens automatically
            3. Paste a product URL and click Crawl

            > Windows SmartScreen warning on first launch: click "More info" → "Run anyway"
          files: dist/KlippiK_Image_Processor.exe
          draft: false
          prerelease: false
